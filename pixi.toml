[workspace]
channels = ["conda-forge"]
name = "cybersecurity_attacks"
platforms = ["win-64","osx-64"]
version = "0.1.0"

[tasks]
# This command runs the entire pipeline
run-pipeline = "python pipeline.py"

# This command runs the Streamlit app
run-app = "python -m streamlit run app.py"

#This command runs the generator for the ascii representation of the directory tree excluding directories and files preceded by '.'
gen-dir-repr = "pwsh -Command './generate_ascii_dir_repr.ps1 ./ -Exclude .*, __pycache__ -Depth 3'"

[dependencies]
python = ">=3.12.12,<3.13"
streamlit = ">=1.54.0,<2"
scikit-learn = ">=1.8.0,<2"
numpy = ">=2.4.2,<3"
matplotlib = ">=3.10.8,<4"
seaborn = ">=0.13.2,<0.14"
user-agents = ">=2.2.0,<3"
folium = ">=0.20.0,<0.21"
streamlit-folium = ">=0.26.2,<0.27"
ipykernel = ">=7.2.0,<8"
django = ">=6.0.2,<7"
pandas = ">=2.3.3,<3"
requests = ">=2.32.5,<3"
plotly = ">=6.5.2,<7"
geoip2 = ">=4.8.0,<5"
gdal = ">=3.12.2,<4"
pandas-stubs = ">=3.0.0.260204,<4"
pyarrow = ">=23.0.1,<24"
geopandas = ">=1.1.2,<2"
geocoder = ">=1.38.1,<2"
pyrosm = ">=0.6.2,<0.7"
curl = ">=8.18.0,<9"
textstat = ">=0.7.13,<0.8"
nltk = ">=3.9.3,<4"
spacy = ">=3.8.11,<4"
lingua-language-detector = ">=1.3.4,<2"
google-cloud-translate = ">=3.24.0,<4"
sqlite = ">=3.51.2,<4"
sklearn-compat = ">=0.1.5,<0.2"
sklearn-pandas = ">=2.2.0,<3"
pixi-kernel = ">=0.7.1,<0.8"
libsqlite = ">=3.51.2,<4"
sqlite-utils = ">=3.39,<4"

[pypi-dependencies]
scipy = "*"
statsmodels = "*"
chardet = ">=6.0.0.post1, <7"
charset-normalizer = "*"
ftfy = ">=6.3.1, <7"
yara-python = ">=4.5.4, <5"
ioc-finder = ">=5.0.3, <6"
validators = ">=0.35.0, <0.36"
deep-translator = ">=1.11.4, <2"
prince = ">=0.16.5, <0.17"
pyyaml = "*"
ua-parser = "*"
user-agents = "*"
huggingface-hub = ">=0.30, <1"
